format = "$directory$git_branch$git_status$env_var.AWS_SSO_PROMPT$env_var.CURSOR_SPEND_PROMPT$character"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
format = "[$path]($style) "
style = "bold cyan"

[git_branch]
format = "on [$branch]($style) "
style = "bold purple"

[git_status]
format = "[$all_status]($style)"
style = "bold red"
modified = "●"
untracked = "?"
staged = "+"
ahead = "↑"
behind = "↓"

# AWS SSO Expiry - reads from environment variable set by precmd hook
# Color is embedded in the variable itself using ANSI codes
[env_var.AWS_SSO_PROMPT]
format = "$env_value "
style = ""

# Cursor spend today (set by precmd in zshrc; Enterprise Admin API)
[env_var.CURSOR_SPEND_PROMPT]
format = "$env_value "
style = ""
